name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Debug secrets
        run: |
          echo "PIN length: ${#VITE_ADMIN_PIN}"
          echo "PAT length: ${#VITE_GH_WRITE_PAT}"
        env:
          VITE_ADMIN_PIN: ${{ secrets.VITE_ADMIN_PIN }}
          VITE_GH_WRITE_PAT: ${{ secrets.VITE_GH_WRITE_PAT }}

      - name: Build
        run: npm run build
        env:
          VITE_ADMIN_PIN: ${{ secrets.VITE_ADMIN_PIN }}
          VITE_GH_WRITE_PAT: ${{ secrets.VITE_GH_WRITE_PAT }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
